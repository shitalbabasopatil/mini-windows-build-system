version: '3.8'

services:
  build-server:
    build: .
    labels:
      author: "Shital Babaso Patil"
      email: "shitalbabasopatil@gmail.com"
    ports:
      - "8000:8000"
    volumes:
      # Mount the Docker engine named pipe to allow launching sibling containers
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine
      # Persistent storage for builds and database
      - type: bind
        source: ./storage
        target: C:\app\storage
      - type: bind
        source: ./database
        target: C:\app\database
    environment:
      - DOCKER_HOST=npipe:////./pipe/docker_engine
    restart: always

networks:
  default:
    external:
      name: nat
